<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Word Master</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; padding: 1.5rem 1rem; }
      h1 { text-align: center; font-size: 24px; font-weight: 600; margin-bottom: 1.5rem; }
      .app { max-width: 860px; margin: 0 auto; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.25rem; }
      .card h2 { font-size: 14px; font-weight: 500; color: #94a3b8; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }
      .full { grid-column: 1/-1; }
      .row { display: flex; gap: 8px; margin-bottom: 8px; }
      input { flex: 1; min-width: 0; padding: 8px 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #f1f5f9; font-size: 14px; outline: none; }
      input:focus { border-color: #3b82f6; }
      button { padding: 8px 14px; border-radius: 8px; border: none; background: #2563eb; color: white; font-size: 14px; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
      button:hover { background: #1d4ed8; }
      .search { width: 100%; margin-bottom: 10px; }
      .word-list { max-height: 200px; overflow-y: auto; }
      .word-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 4px; border-bottom: 1px solid #334155; font-size: 14px; }
      .word-item:last-child { border-bottom: none; }
      .w-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
      .star-btn { background: none; border: none; cursor: pointer; font-size: 15px; padding: 0 2px; color: #94a3b8; }
      .del-btn { font-size: 12px; padding: 4px 8px; border-radius: 6px; background: none; border: 1px solid #475569; color: #94a3b8; cursor: pointer; transition: all 0.15s; }
      .del-btn:hover { background: #450a0a; color: #fca5a5; border-color: #7f1d1d; }
      .flash-word { font-size: 28px; font-weight: 600; text-align: center; padding: 1rem 0 0.5rem; min-height: 60px; }
      .flash-meaning { font-size: 17px; text-align: center; color: #94a3b8; min-height: 30px; margin-bottom: 1rem; }
      .btn-row { display: flex; gap: 8px; justify-content: center; }
      .quiz-word { font-size: 22px; font-weight: 600; text-align: center; padding: 0.75rem 0; min-height: 48px; }
      .quiz-type-tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
      .tab { flex: 1; text-align: center; padding: 6px 4px; font-size: 12px; border-radius: 8px; border: 1px solid #334155; cursor: pointer; background: #0f172a; color: #94a3b8; transition: all 0.15s; min-width: 80px; }
      .tab:hover { background: #1e293b; }
      .tab.active { background: #1e40af; color: #bfdbfe; border-color: #3b82f6; }
      .quiz-result { text-align: center; font-size: 14px; font-weight: 600; min-height: 22px; margin-top: 8px; }
      .result-ok { color: #4ade80; }
      .result-ng { color: #f87171; }
      .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
      .stat { background: #0f172a; border-radius: 8px; padding: 0.75rem 1rem; text-align: center; }
      .stat-label { font-size: 11px; color: #64748b; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
      .stat-val { font-size: 22px; font-weight: 600; }
      .acc-val { color: #60a5fa; }
      .empty { text-align: center; color: #475569; font-size: 13px; padding: 1rem 0; }
      .mcq-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
      .mcq-btn { padding: 10px 12px; font-size: 13px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; cursor: pointer; color: #f1f5f9; text-align: left; transition: all 0.15s; }
      .mcq-btn:hover { background: #1e293b; border-color: #475569; }
      .mcq-btn.correct { background: #052e16; color: #4ade80; border-color: #166534; }
      .mcq-btn.wrong { background: #450a0a; color: #f87171; border-color: #7f1d1d; }

      .cycle-status { display: flex; align-items: center; justify-content: space-between; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; }
      .cycle-left { font-size: 13px; color: #94a3b8; }
      .cycle-left strong { color: #f1f5f9; }
      .cycle-num { font-size: 12px; color: #64748b; }
      .cycle-progress { width: 100%; height: 4px; background: #1e293b; border-radius: 2px; margin-bottom: 12px; overflow: hidden; }
      .cycle-progress-bar { height: 100%; background: #2563eb; border-radius: 2px; transition: width 0.3s; }
      .cycle-complete { text-align: center; padding: 1rem; }
      .cycle-complete .big { font-size: 28px; margin-bottom: 6px; }
      .cycle-complete .msg { font-size: 14px; color: #94a3b8; margin-bottom: 12px; }

      @media (max-width: 600px) {
        .grid { grid-template-columns: 1fr; }
        .full { grid-column: 1; }
        .mcq-options { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <h1>📚 Word Master</h1>
      <div class="grid">

        <div class="card full">
          <h2>단어 추가</h2>
          <div class="row">
            <input id="inEn" placeholder="영어 단어" />
            <input id="inKo" placeholder="한국어 뜻" />
            <button onclick="addWord()">추가</button>
          </div>
          <input class="search" id="search" placeholder="검색..." oninput="renderList()" />
          <div class="word-list" id="list">
            <div class="empty">단어를 추가해보세요</div>
          </div>
        </div>

        <div class="card">
          <h2>플래시 카드</h2>
          <div class="flash-word" id="flashWord">—</div>
          <div class="flash-meaning" id="flashMeaning"></div>
          <div class="btn-row">
            <button onclick="showMeaning()">뜻 보기</button>
            <button onclick="nextFlash()">다음</button>
          </div>
        </div>

        <div class="card">
          <h2>통계</h2>
          <div class="stats-grid">
            <div class="stat"><div class="stat-label">총 단어</div><div class="stat-val" id="statTotal">0</div></div>
            <div class="stat"><div class="stat-label">맞음</div><div class="stat-val result-ok" id="statCorrect">0</div></div>
            <div class="stat"><div class="stat-label">틀림</div><div class="stat-val result-ng" id="statWrong">0</div></div>
          </div>
          <div class="stats-grid">
            <div class="stat" style="grid-column:1/-1"><div class="stat-label">정답률</div><div class="stat-val acc-val" id="statAcc">—</div></div>
          </div>
        </div>

        <div class="card full">
          <h2>퀴즈</h2>

          <div class="cycle-status">
            <div class="cycle-left">남은 문제: <strong id="cycleRemain">0</strong> / <strong id="cycleTotal">0</strong></div>
            <div class="cycle-num" id="cycleNum">사이클 1</div>
          </div>
          <div class="cycle-progress"><div class="cycle-progress-bar" id="cycleBar" style="width:0%"></div></div>

          <div class="quiz-type-tabs">
            <button class="tab active" id="tab0" onclick="setMode(0)">영→한 단답</button>
            <button class="tab" id="tab1" onclick="setMode(1)">한→영 단답</button>
            <button class="tab" id="tab2" onclick="setMode(2)">영→한 객관식</button>
            <button class="tab" id="tab3" onclick="setMode(3)">한→영 객관식</button>
          </div>

          <div id="quizArea">
            <div class="quiz-word" id="quizWord">—</div>
            <div id="quizInputArea">
              <div class="row">
                <input id="quizInput" placeholder="정답 입력 후 Enter" onkeydown="if(event.key==='Enter')checkQuiz();" />
                <button onclick="checkQuiz()">확인</button>
              </div>
            </div>
            <div id="mcqOptions" class="mcq-options" style="display:none"></div>
            <div class="quiz-result" id="quizResult"></div>
          </div>

          <div id="cycleCompletePanel" style="display:none" class="cycle-complete">
            <div class="big">🎉</div>
            <div class="msg" id="cycleCompleteMsg"></div>
            <button onclick="startNewCycle()">다음 사이클 시작</button>
          </div>

        </div>
      </div>
    </div>

    <script>
      let words = [];
      let correct = 0, wrong = 0;
      let flashIdx = 0;
      let quizMode = 0;
      let mcqLocked = false;

      // 사이클 상태
      let cycleNum = 1;
      // 이번 사이클에서 아직 안 푼 단어 인덱스 배열 (셔플됨)
      let cycleQueue = [];
      // 현재 문제의 words 인덱스
      let quizIdx = -1;
      // 사이클 시작 시 총 단어 수 (프로그레스바용)
      let cycleTotalStart = 0;

      try { words = JSON.parse(localStorage.getItem('wmp_words')) || []; } catch(e) {}
      try { correct = Number(localStorage.getItem('wmp_correct')) || 0; } catch(e) {}
      try { wrong = Number(localStorage.getItem('wmp_wrong')) || 0; } catch(e) {}
      try { cycleNum = Number(localStorage.getItem('wmp_cycleNum')) || 1; } catch(e) {}
      try {
        let q = localStorage.getItem('wmp_cycleQueue');
        if (q) cycleQueue = JSON.parse(q);
      } catch(e) {}
      try { cycleTotalStart = Number(localStorage.getItem('wmp_cycleTotalStart')) || 0; } catch(e) {}

      function save() {
        try {
          localStorage.setItem('wmp_words', JSON.stringify(words));
          localStorage.setItem('wmp_correct', correct);
          localStorage.setItem('wmp_wrong', wrong);
          localStorage.setItem('wmp_cycleNum', cycleNum);
          localStorage.setItem('wmp_cycleQueue', JSON.stringify(cycleQueue));
          localStorage.setItem('wmp_cycleTotalStart', cycleTotalStart);
        } catch(e) {}
      }

      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          let j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      // 새 사이클 초기화: 전체 단어 인덱스를 셔플해서 큐에 넣음
      function startNewCycle() {
        if (!words.length) return;
        cycleQueue = shuffle(words.map((_, i) => i));
        cycleTotalStart = cycleQueue.length;
        document.getElementById('cycleCompletePanel').style.display = 'none';
        document.getElementById('quizArea').style.display = '';
        save();
        nextQuiz();
      }

      function addWord() {
        let e = document.getElementById('inEn').value.trim();
        let k = document.getElementById('inKo').value.trim();
        if (!e || !k) return;
        let newIdx = words.length;
        words.push({ en: e, ko: k, star: false });
        document.getElementById('inEn').value = '';
        document.getElementById('inKo').value = '';
        // 새 단어는 현재 사이클 큐의 랜덤 위치에 삽입
        if (cycleQueue.length >= 0) {
          let pos = Math.floor(Math.random() * (cycleQueue.length + 1));
          cycleQueue.splice(pos, 0, newIdx);
          if (!cycleTotalStart) cycleTotalStart = 1;
          else cycleTotalStart++;
        }
        save(); renderList(); updateStats(); updateCycleUI();
        if (words.length === 1) { startNewCycle(); nextFlash(); }
      }

      function deleteWord(i) {
        words.splice(i, 1);
        // 큐에서 해당 인덱스 제거, 이후 인덱스 조정
        cycleQueue = cycleQueue.filter(idx => idx !== i).map(idx => idx > i ? idx - 1 : idx);
        if (quizIdx === i) quizIdx = -1;
        else if (quizIdx > i) quizIdx--;
        cycleTotalStart = Math.max(0, cycleTotalStart - 1);
        save(); renderList(); updateStats(); updateCycleUI();
      }

      function toggleStar(i) { words[i].star = !words[i].star; save(); renderList(); }

      function renderList() {
        let q = document.getElementById('search').value.toLowerCase();
        let el = document.getElementById('list');
        let inQueue = new Set(cycleQueue);
        let items = words.map((w, i) => ({...w, i}))
          .filter(w => w.en.toLowerCase().includes(q) || w.ko.includes(q));
        if (!items.length) {
          el.innerHTML = '<div class="empty">' + (words.length ? '검색 결과 없음' : '단어를 추가해보세요') + '</div>';
          return;
        }
        el.innerHTML = items.map(w => {
          let pending = inQueue.has(w.i);
          let dot = pending
            ? `<span style="font-size:11px;color:#fbbf24;flex-shrink:0">● 대기중</span>`
            : `<span style="font-size:11px;color:#4ade80;flex-shrink:0">✓ 완료</span>`;
          if (w.i === quizIdx) dot = `<span style="font-size:11px;color:#60a5fa;flex-shrink:0">▶ 현재</span>`;
          return `<div class="word-item">
            <span><strong style="font-weight:500">${w.en}</strong> <span style="color:#94a3b8">| ${w.ko}</span></span>
            <div class="w-actions">
              ${dot}
              <button class="star-btn" onclick="toggleStar(${w.i})">${w.star ? '⭐' : '☆'}</button>
              <button class="del-btn" onclick="deleteWord(${w.i})">삭제</button>
            </div>
          </div>`;
        }).join('');
      }

      function updateStats() {
        document.getElementById('statTotal').innerText = words.length;
        document.getElementById('statCorrect').innerText = correct;
        document.getElementById('statWrong').innerText = wrong;
        let total = correct + wrong;
        document.getElementById('statAcc').innerText = total ? Math.round(correct / total * 100) + '%' : '—';
      }

      function updateCycleUI() {
        let remain = cycleQueue.length;
        let total = cycleTotalStart || words.length;
        document.getElementById('cycleRemain').innerText = remain;
        document.getElementById('cycleTotal').innerText = total;
        document.getElementById('cycleNum').innerText = '사이클 ' + cycleNum;
        let pct = total > 0 ? Math.round((total - remain) / total * 100) : 0;
        document.getElementById('cycleBar').style.width = pct + '%';
      }

      function nextFlash() {
        if (!words.length) { document.getElementById('flashWord').innerText = '—'; document.getElementById('flashMeaning').innerText = ''; return; }
        flashIdx = Math.floor(Math.random() * words.length);
        document.getElementById('flashWord').innerText = words[flashIdx].en;
        document.getElementById('flashMeaning').innerText = '';
      }

      function showMeaning() {
        if (!words.length) return;
        document.getElementById('flashMeaning').innerText = words[flashIdx].ko;
      }

      function setMode(m) {
        quizMode = m;
        [0,1,2,3].forEach(i => document.getElementById('tab'+i).classList.toggle('active', i === m));
        let isMcq = m >= 2;
        document.getElementById('quizInputArea').style.display = isMcq ? 'none' : '';
        document.getElementById('mcqOptions').style.display = isMcq ? 'grid' : 'none';
        document.getElementById('quizResult').innerText = '';
        // 모드 변경은 현재 문제 그대로 유지, UI만 갱신
        if (quizIdx >= 0 && quizMode >= 2) renderMcq(quizMode === 3);
      }

      function nextQuiz() {
        if (!words.length) { document.getElementById('quizWord').innerText = '—'; return; }

        // 사이클 큐가 비었으면 완료 처리
        if (cycleQueue.length === 0) {
          showCycleComplete();
          return;
        }

        mcqLocked = false;
        // 큐 앞에서 꺼내기
        quizIdx = cycleQueue[0];
        // 아직 큐에서 제거하지 않음 — 정답 맞춰야 제거됨

        let w = words[quizIdx];
        let isKoEn = quizMode === 1 || quizMode === 3;
        document.getElementById('quizWord').innerText = isKoEn ? w.ko : w.en;
        document.getElementById('quizResult').innerText = '';
        let inp = document.getElementById('quizInput');
        if (inp) inp.value = '';
        if (quizMode >= 2) renderMcq(isKoEn);
        updateCycleUI();
        renderList();
      }

      function showCycleComplete() {
        document.getElementById('quizArea').style.display = 'none';
        document.getElementById('cycleCompletePanel').style.display = '';
        cycleNum++;
        document.getElementById('cycleCompleteMsg').innerText =
          `사이클 ${cycleNum - 1} 완료! 모든 단어를 맞혔어요. 사이클 ${cycleNum}을 시작하세요.`;
        save();
      }

      function renderMcq(isKoEn) {
        let w = words[quizIdx];
        let correctAns = isKoEn ? w.en : w.ko;
        let pool = words.filter((_, i) => i !== quizIdx);
        let opts = [correctAns];
        while (opts.length < 4 && pool.length) {
          let ri = Math.floor(Math.random() * pool.length);
          let cand = isKoEn ? pool[ri].en : pool[ri].ko;
          if (!opts.includes(cand)) opts.push(cand);
          pool.splice(ri, 1);
        }
        opts.sort(() => Math.random() - 0.5);
        let el = document.getElementById('mcqOptions');
        el.innerHTML = opts.map(o =>
          `<button class="mcq-btn" onclick="checkMcq(this,'${o.replace(/'/g,"\\'")}','${correctAns.replace(/'/g,"\\'")}')">  ${o}</button>`
        ).join('');
      }

      function handleResult(ok) {
        if (ok) {
          correct++;
          // 큐 맨 앞에서 제거 (이 단어는 이번 사이클에서 끝)
          cycleQueue.shift();
        } else {
          wrong++;
          // 큐 맨 앞에서 꺼내서 랜덤 뒷자리에 다시 삽입 (단, 바로 다음은 X)
          cycleQueue.shift();
          let insertPos = cycleQueue.length > 1
            ? Math.floor(Math.random() * (cycleQueue.length - 1)) + 1
            : cycleQueue.length;
          cycleQueue.splice(insertPos, 0, quizIdx);
        }
        save();
        updateStats();
      }

      function checkMcq(btn, chosen, correctAns) {
        if (mcqLocked) return;
        mcqLocked = true;
        let ok = chosen === correctAns;
        btn.classList.add(ok ? 'correct' : 'wrong');
        if (!ok) document.querySelectorAll('.mcq-btn').forEach(b => {
          if (b.innerText.trim() === correctAns) b.classList.add('correct');
        });
        handleResult(ok);
        document.getElementById('quizResult').innerHTML =
          `<span class="${ok ? 'result-ok' : 'result-ng'}">${ok ? '정답! 이번 사이클에서 제거됐어요 ✓' : '오답: ' + correctAns + ' — 다시 출제됩니다'}</span>`;
        setTimeout(nextQuiz, 1300);
      }

      function checkQuiz() {
        if (!words.length) return;
        let inp = document.getElementById('quizInput');
        let ans = inp.value.trim();
        if (!ans) return;
        let isKoEn = quizMode === 1;
        let target = isKoEn ? words[quizIdx].en : words[quizIdx].ko;
        let ok = ans.toLowerCase() === target.toLowerCase();
        handleResult(ok);
        document.getElementById('quizResult').innerHTML =
          `<span class="${ok ? 'result-ok' : 'result-ng'}">${ok ? '정답! 이번 사이클에서 제거됐어요 ✓' : '오답: ' + target + ' — 다시 출제됩니다'}</span>`;
        inp.value = '';
        setTimeout(nextQuiz, 1100);
      }

      // 초기화: 큐가 비어있으면 새 사이클 준비
      if (words.length && cycleQueue.length === 0) startNewCycle();
      else { updateCycleUI(); nextQuiz(); }
      renderList(); updateStats(); nextFlash();
    </script>
  </body>
</html>
